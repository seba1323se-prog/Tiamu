<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Amor para Simon 💖</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Canvas for celebration confetti and hearts -->
    <canvas id="celebration-canvas"></canvas>

    <!-- Floating hearts in the background -->
    <div class="floating-hearts-bg" id="hearts-bg"></div>

    <div class="app-container">
        <div class="card" id="love-card">
            <h1 class="title">Test de Amor para Simon 💖</h1>
            
            <div class="image-wrapper">
                <img id="raccoon-img" src="images/inicio.png" alt="Raccoon Love" class="raccoon-image">
            </div>

            <div class="content-wrapper">
                <h2 id="question" class="question">¿Me amas, mi amorsito? 🥺</h2>
                
                <div class="btn-group" id="buttons-container">
                    <button id="btn-si" class="btn btn-si">¡Sí, muchísimo! ❤️</button>
                    <button id="btn-no" class="btn btn-no">No... 💔</button>
                </div>

                <div id="celebration-text" class="celebration-text hidden">
                    <p class="love-message">¡Eres el amor de mi vida, Simon! Gracias por hacerme tan feliz cada día. ¡Te amo infinito! 🥰💍✨</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
